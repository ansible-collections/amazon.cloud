# Ansible collection testing with ansible-test-gh-action
#
# Note: Integration tests are handled separately in integration.yml due to
# their complexity and AWS credential requirements.

name: ansible-test

on: [workflow_call]  # allow this workflow to be called from other workflows

jobs:
  sanity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible-core-version:
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - milestone
          - devel
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        exclude:
          # Collection does not support ansible-core == 2.16 (omitted from matrix)
          # devel and milestone don't support older Python versions
          - ansible-core-version: devel
            python-version: "3.10"
          - ansible-core-version: devel
            python-version: "3.11"
          - ansible-core-version: milestone
            python-version: "3.10"
          - ansible-core-version: milestone
            python-version: "3.11"
          # stable-2.21 excludes
          - ansible-core-version: stable-2.21
            python-version: "3.10"
          - ansible-core-version: stable-2.21
            python-version: "3.11"
          # stable-2.20 excludes
          - ansible-core-version: stable-2.20
            python-version: "3.10"
          - ansible-core-version: stable-2.20
            python-version: "3.14"
          # stable-2.19 excludes
          - ansible-core-version: stable-2.19
            python-version: "3.10"
          - ansible-core-version: stable-2.19
            python-version: "3.14"
          # stable-2.18 excludes
          - ansible-core-version: stable-2.18
            python-version: "3.10"
          - ansible-core-version: stable-2.18
            python-version: "3.14"
          # stable-2.17 excludes
          - ansible-core-version: stable-2.17
            python-version: "3.13"
          - ansible-core-version: stable-2.17
            python-version: "3.14"
    steps:
      - name: Perform sanity testing
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e # v1.17.0
        with:
          ansible-core-version: ${{ matrix.ansible-core-version }}
          testing-type: sanity
          target-python-version: ${{ matrix.python-version }}
          test-deps: -r ansible_collections/amazon/cloud/tests/sanity/requirements.yml

  units:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible-core-version:
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - milestone
          - devel
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        exclude:
          # Collection does not support ansible-core == 2.16 (omitted from matrix)
          # devel and milestone don't support older Python versions
          - ansible-core-version: devel
            python-version: "3.10"
          - ansible-core-version: devel
            python-version: "3.11"
          - ansible-core-version: milestone
            python-version: "3.10"
          - ansible-core-version: milestone
            python-version: "3.11"
          # stable-2.21 excludes
          - ansible-core-version: stable-2.21
            python-version: "3.10"
          - ansible-core-version: stable-2.21
            python-version: "3.11"
          # stable-2.20 excludes
          - ansible-core-version: stable-2.20
            python-version: "3.10"
          - ansible-core-version: stable-2.20
            python-version: "3.14"
          # stable-2.19 excludes
          - ansible-core-version: stable-2.19
            python-version: "3.10"
          - ansible-core-version: stable-2.19
            python-version: "3.14"
          # stable-2.18 excludes
          - ansible-core-version: stable-2.18
            python-version: "3.10"
          - ansible-core-version: stable-2.18
            python-version: "3.14"
          # stable-2.17 excludes
          - ansible-core-version: stable-2.17
            python-version: "3.13"
          - ansible-core-version: stable-2.17
            python-version: "3.14"
    steps:
      - name: Perform unit testing
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e # v1.17.0
        with:
          ansible-core-version: ${{ matrix.ansible-core-version }}
          testing-type: units
          target-python-version: ${{ matrix.python-version }}
          test-deps: -r ansible_collections/amazon/cloud/tests/unit/requirements.yml
          pre-test-cmd: python -m pip install -r test-requirements.txt
