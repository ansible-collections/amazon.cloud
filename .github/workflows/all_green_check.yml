---
name: all_green

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - 'stable-*'
  push:
    branches:
      - main
      - 'stable-*'
    tags:
      - '*'

jobs:
  linters:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/linters.yml  # use the callable linters job to run tests
  coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    needs:
      - ansible-test
    env:
      ANSIBLE_CORE_REF: "stable-2.17"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ansible-test requires cwd under .../ansible_collections/{namespace}/{name}/
          path: ansible_collections/amazon/cloud

      - name: Checkout amazon.aws dependency
        uses: ansible-network/github_actions/.github/actions/checkout_dependency@47822b51aee957080e811cc434443c4e3bb9569a
        with:
          repository: ansible-collections/amazon.aws
          path: ansible_collections/amazon/aws
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ansible (ansible-test)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "https://github.com/ansible/ansible/archive/${ANSIBLE_CORE_REF}.tar.gz"

      - name: Run unit tests with coverage
        working-directory: ansible_collections/amazon/cloud
        run: ansible-test units --venv --coverage --python 3.10 --requirements

      - name: Combine and emit coverage XML
        working-directory: ansible_collections/amazon/cloud
        run: |
          ansible-test coverage combine --venv --python 3.10 --requirements
          ansible-test coverage xml --venv --python 3.10 --requirements

      - name: Prepare coverage.xml for SonarCloud
        env:
          COLLECTION_DIR: ${{ github.workspace }}/ansible_collections/amazon/cloud
        run: |
          set -euo pipefail
          xml=$(find "${COLLECTION_DIR}/tests/output/reports" -maxdepth 1 -name '*.xml' ! -name '*powershell*' | head -1)
          if [[ -z "${xml}" ]]; then
            echo "::error::coverage XML not found under tests/output/reports"
            exit 1
          fi
          cp "${xml}" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i "s#${GITHUB_WORKSPACE}/##g" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i 's#ansible_collections/amazon/cloud/##g' "${GITHUB_WORKSPACE}/coverage.xml"
          if ! grep -q '<coverage' "${GITHUB_WORKSPACE}/coverage.xml"; then
            echo "::error::coverage.xml does not look like Cobertura XML"
            exit 1
          fi
          test -s "${GITHUB_WORKSPACE}/coverage.xml"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ github.workspace }}/coverage.xml
  ansible-test:
    uses: ./.github/workflows/ansible-test.yml

  all_green:
    if: ${{ always() }}
    needs:
      - linters
      - coverage
      - ansible-test
    runs-on: ubuntu-latest
    steps:
      - run: |
          python -c "
          import sys

          required = ['coverage', 'ansible-test']
          if '${{ github.event_name }}' == 'pull_request':
              required = ['linters', 'coverage', 'ansible-test']
          results = {
              'linters': '${{ needs.linters.result }}',
              'coverage': '${{ needs.coverage.result }}',
              'ansible-test': '${{ needs.ansible-test.result }}',
          }

          for name in required:
              if results[name] == 'failure':
                  print(f'all_green: required job failed: {name} results={results}', file=sys.stderr)
                  sys.exit(1)

          # cancel-in-progress superseded this run; do not fail (newer run is authoritative)
          if any(v == 'cancelled' for v in results.values()):
              print(
                  'all_green: one or more jobs cancelled (usually concurrency); skipping strict gate.',
                  results,
              )
              sys.exit(0)

          not_ok = [j for j in required if results[j] != 'success']
          if not_ok:
              print(f'all_green: required jobs not success: {not_ok} results={results}', file=sys.stderr)
              sys.exit(1)

          for job, status in results.items():
              if job not in required and status not in ('success', 'skipped'):
                  print(f'all_green: unexpected {job}={status} results={results}', file=sys.stderr)
                  sys.exit(1)

          print('all_green OK', results)
          "

  sonarcloud:
    name: SonarCloud scan
    needs:
      - all_green
      - coverage
    if: >-
      ${{ needs.all_green.result == 'success'
      && (github.event_name == 'push'
      || (github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository)) }}
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}
