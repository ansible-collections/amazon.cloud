---
minor_changes:
  - Bump collection requirement of amazon.aws to `>=11.0.0` to remove duplicate code for user agent (https://github.com/ansible-collections/amazon.cloud/pull/133).
breaking_changes:
  - Support for the ``EC2_ACCESS_KEY`` environment variable in amazon.aws has been removed. Please use the ``access_key`` parameter or ``AWS_ACCESS_KEY_ID`` environment variable
    instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - Support for the ``EC2_REGION`` environment variable in amazon.aws has been removed. Please use the ``region`` parameter or ``AWS_REGION`` environment variable
    instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - Support for the ``EC2_SECRET_KEY`` environment variable in amazon.aws has been removed. Please use the ``secret_key`` parameter or ``AWS_SECRET_ACCESS_KEY`` environment variable
    instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - Support for the ``EC2_SECURITY_TOKEN`` and ``AWS_SECURITY_TOKEN`` environment variables in amazon.aws has been removed. Please use the ``session_token`` parameter or ``AWS_SESSION_TOKEN`` environment variable
    instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - Support for the ``EC2_URL`` and ``S3_URL`` environment variables in amazon.aws has been removed. Please use the ``endpoint_url`` parameter or ``AWS_URL`` environment variable
    instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``access_token``, ``aws_security_token`` and ``security_token`` aliases for the ``session_token`` parameter have been removed.  Please use the ``session_token`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``boto_profile`` alias for the ``profile`` parameter has been removed.  Please use the ``profile`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``ec2_access_key`` alias for the ``access_key`` parameter has been removed.  Please use the ``access_key`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``ec2_region`` alias for the ``region`` parameter has been removed.  Please use the ``region`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``ec2_secret_key`` alias for the ``secret_key`` parameter has been removed.  Please use the ``secret_key`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
  - The ``endpoint``, ``ec2_url`` and ``s3_url`` aliases for the ``endpoint_url`` parameter have been removed.  Please use the ``endpoint_url`` name instead (https://github.com/ansible-collections/amazon.cloud/pull/134).
